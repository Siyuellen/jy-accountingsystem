<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>jy经费系统</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f8fe;
            font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
            padding: 28px 24px;
            color: #13294b;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 28px;
        }
        .hero h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(120deg, #124263, #1b5a7e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p {
            color: #3c6e8f;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid #e7edf3;
        }
        .card-padding {
            padding: 1.4rem 1.8rem;
        }
        .card-title {
            font-weight: 650;
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1c5375;
            letter-spacing: -0.2px;
        }

        /* KPI网格 - 数字居中且美观 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            border: 1px solid #e9f0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .kpi-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5d7f9e;
            margin-bottom: 8px;
        }
        .kpi-number {
            font-size: 2rem;
            font-weight: 700;
            margin: 4px 0 2px;
            color: #164a6b;
            line-height: 1.2;
        }
        .kpi-sub {
            font-size: 0.7rem;
            color: #6f90ad;
        }

        /* 图表双栏布局 */
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 32px;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
        }
        canvas {
            max-height: 300px;
            width: 100%;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th {
            text-align: left;
            padding: 12px 12px;
            background: #fafdff;
            font-weight: 600;
            color: #1b4f72;
            border-bottom: 1.5px solid #e2edf7;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #edf3f9;
            text-align: left;
            vertical-align: middle;
        }
        td:last-child, th:last-child {
            text-align: right;
        }
        .money-positive {
            font-weight: 600;
            color: #1f8a4c;
        }
        .money-neutral {
            font-weight: 500;
            color: #c2592c;
        }
        .file-link {
            font-size: 0.7rem;
            background: #eef3fc;
            padding: 2px 6px;
            border-radius: 20px;
            text-decoration: none;
            color: #1f6392;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #b1624b;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .delete-btn:hover { opacity: 1; }
        .badge-supplement {
            background: #e6f7e6;
            color: #2e7d32;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-block;
        }
        .badge-normal {
            background: #eef3fc;
            color: #1f6392;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-block;
        }

        /* 记账面板 */
        .add-transaction-panel {
            background: #ffffff;
            border-radius: 32px;
            margin-bottom: 32px;
            border: 1px solid #eaf1f8;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-top: 8px;
        }
        .field-group {
            flex: 1;
            min-width: 130px;
        }
        .field-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a7492;
        }
        .field-group input, .field-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cfdfed;
            background: white;
            font-size: 0.8rem;
            font-family: inherit;
        }
        .field-group input:focus, .field-group select:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.1);
        }
        .btn-primary {
            background: #1f6e96;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #0f567a;
            transform: translateY(-1px);
        }

        @media (max-width: 760px) {
            body { padding: 16px; }
            .form-grid { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="hero">
        <h1>jy经费系统</h1>
            </div>

    <!-- KPI卡片 数字居中一致 -->
    <div class="kpi-grid" id="kpiArea"></div>

    <!-- 实时记账模块 (补录/非补录 + 报销单号 + 发票上传) -->
    <div class="add-transaction-panel card-padding">
        <div class="card-title">实时记账</div>
        <div class="form-grid">
            <div class="field-group">
                <label>日期</label>
                <input type="date" id="txnDate" value="2026-04-30">
            </div>
            <div class="field-group">
                <label>预算分类</label>
                <select id="txnCategory">
                    <option value="国内差旅">国内差旅</option>
                    <option value="劳务">劳务</option>
                    <option value="日常（说明事由）">日常</option>
                    <option value="办公材料">办公材料</option>
                    <option value="邮费">邮费</option>
                    <option value="因公出国">因公出国</option>
                    <option value="酬金">酬金</option>
                    <option value="版面费">版面费</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="field-group">
                <label>收支说明</label>
                <input type="text" id="txnDesc" placeholder="例: 学生劳务/设备采购" autocomplete="off">
            </div>
            <div class="field-group">
                <label>关联项目</label>
                <select id="txnProject"></select>
            </div>
            <div class="field-group">
                <label>报销单号</label>
                <input type="text" id="txnReimburseNo" placeholder="可选填">
            </div>
            <div class="field-group">
                <label>发票 (图片/链接)</label>
                <input type="text" id="txnInvoiceLink" placeholder="可填发票号码或链接">
            </div>
            <div class="field-group">
                <label>补录/非补录</label>
                <select id="txnIsSupplement">
                    <option value="非补录">非补录 (实时，影响总额)</option>
                    <option value="补录">补录 (仅记录，不影响总额)</option>
                </select>
            </div>
            <div class="field-group">
                <label>收入(¥)</label>
                <input type="number" id="txnIncome" value="0" step="0.01">
            </div>
            <div class="field-group">
                <label>支出(¥)</label>
                <input type="number" id="txnExpense" value="0" step="0.01">
            </div>
            <div class="field-group">
                <button class="btn-primary" id="addTransactionBtn">+ 记录流水</button>
            </div>
        </div>
    </div>

    <!-- 图表区 : 饼图 + 横向项目排行 / 纵向项目排行（全部项目）-->
    <div class="charts-row">
        <div class="chart-box card card-padding">
            <div class="card-title">各预算分类支出占比 (仅实时支出)</div>
            <canvas id="expensePieChart" width="400" height="280" style="max-height:280px;"></canvas>
        </div>
        <div class="chart-box card card-padding">
            <div class="card-title">横向项目可用余额排行 (全部)</div>
            <canvas id="horizontalBarChart" width="400" height="300"></canvas>
        </div>
    </div>
    <div class="charts-row">
        <div class="chart-box card card-padding">
            <div class="card-title">纵向项目可用余额排行 (全部)</div>
            <canvas id="verticalBarChart" width="400" height="300"></canvas>
        </div>
        <div class="chart-box card card-padding">
            <div class="card-title">项目冻结 vs 原始可用 (部分展示)</div>
            <canvas id="freezeAvailableChart" width="400" height="260"></canvas>
        </div>
    </div>

    <!-- 项目经费总表（含完整名称及记账动态：非补录才影响动态余额）-->
    <div class="card card-padding" style="margin-bottom: 28px;">
        <div class="card-title">项目经费明细表</div>
        <div class="table-wrapper">
            <table id="projectsMasterTable">
                <thead>
                    <tr><th>项目短码</th><th>项目完整全称</th><th>冻结金额(¥)</th><th>原始可用(¥)</th><th>非补录收入(¥)</th><th>非补录支出(¥)</th><th>当前动态余额(¥)</th></tr>
                </thead>
                <tbody id="projectsMasterBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 记账流水记录 (含补录标记、报销单号、发票) -->
    <div class="card card-padding">
        <div class="card-title">记账流水记录 </div>
        <div class="table-wrapper">
            <table id="recentTxTable">
                <thead>
                    <tr>
                        <th>日期</th><th>分类</th><th>说明</th><th>项目</th><th>补录状态</th><th>报销单号</th><th>发票/凭证</th><th>收入(¥)</th><th>支出(¥)</th><th style="width:40px"></th>
                    </tr>
                </thead>
                <tbody id="recentTxBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // jy老师完整项目数据 (横向/纵向分类)
    // 核心逻辑: 补录标记(isSupplement === "补录") 的记录 不计入 projectIncomes/projectExpenses
    //           仅非补录记录才影响动态余额、KPI中的记账总收入/支出以及项目明细表中的记账收支
    // 补录记录只显示在流水表中做留痕，不影响任何财务总计指标
    // --------------------------------------------------------------
    const baseProjects = [
        { code: "纵_BR001", fullName: "【111200+1944226R3/001】控制学院百人计划王竟亦科研启动经费", freeze: 26813, baseAvailable: 93187, type: "纵向" },
        { code: "纵_BR002", fullName: "【111200*1942226R3/002】控制学院百人计划王竟亦科研启动经费", freeze: 0, baseAvailable: 286000, type: "纵向" },
        { code: "纵_BH", fullName: "【111200-521902/052】博后指导费-卜昊、沈锡聪", freeze: 0, baseAvailable: 74928, type: "纵向" },
        { code: "纵_BY2022", fullName: "【111200-5405A1/120/047】2022级毕业论文", freeze: 0, baseAvailable: 2500, type: "纵向" },
        { code: "纵_YJS", fullName: "【111200-540606/759/027/019】研究生业务费", freeze: 0, baseAvailable: 9750, type: "纵向" },
        { code: "纵_JL2024", fullName: "【111200-542810/188/002】2024年度浙江大学科学技术奖励（王竟亦）", freeze: 0, baseAvailable: 8000, type: "纵向" },
        { code: "会_IC", fullName: "【111200-652303】ICFEM 2025国际会议", freeze: 4449.77, baseAvailable: 116708.23, type: "纵向" },
        { code: "横_DW", fullName: "【111200-I22102】★多维感知融合目标检测系统安全测试技术", freeze: 44232.6, baseAvailable: 13351.8, type: "横向" },
        { code: "纵_SD", fullName: "【111200-N72201】★深度学习系统可信测试与加固研究", freeze: 7500, baseAvailable: 0, type: "纵向" },
        { code: "纵_GLF", fullName: "【111212-520866000】王竟亦 科研团队管理费", freeze: 0, baseAvailable: 125.75, type: "纵向" },
        { code: "横_DMX", fullName: "【111212-I22501】大模型缺陷根因溯源及定向可证明修复方法研究", freeze: 0, baseAvailable: 394408, type: "横向" },
        { code: "横_NLP", fullName: "【111212-I52201】★基于NLP的安全协议自动化建模技术研究", freeze: 0, baseAvailable: 80762.14, type: "横向" },
        { code: "横_MXDM", fullName: "【111212-I52202】★面向安全关键代码的形式化验证技术研究", freeze: 1, baseAvailable: 17767.43, type: "横向" },
        { code: "横_QZX", fullName: "【111212-I52402】去中心身份认证协议端到端安全验证技术研究", freeze: 0, baseAvailable: 185897.93, type: "横向" },
        { code: "纵_MXPT", fullName: "【111212-J32201ZJ】面向网络空间的自主可控人工智能安全评测平台", freeze: 0, baseAvailable: 3563.59, type: "纵向" },
        { code: "纵_MXPTJJ", fullName: "【111212-J32201JJ】面向网络空间的自主可控人工智能安全评测平台", freeze: 0, baseAvailable: 549.65, type: "纵向" },
        { code: "纵_GYL", fullName: "【111212-J32501ZJ】异构复杂软件供应链风险评估与安全治理研究", freeze: 0, baseAvailable: 789.32, type: "纵向" },
        { code: "纵_GYLJJ", fullName: "【111212-J32501JJ】异构复杂软件供应链风险评估与安全治理研究", freeze: 0, baseAvailable: 29560, type: "纵向" },
        { code: "横_ALI5", fullName: "【124009-I22504/017】阿里人工智能安全联合实验室-课题5报告可热插拔式大语言模型安全机制研究", freeze: 0, baseAvailable: 237000, type: "横向" },
        { code: "纵_QZKF", fullName: "【182150*A6265121/002/015】2026全重开放课题-吴道远-基于大模型知识图谱的工控设备网络协议安全分析技术", freeze: 0, baseAvailable: 30000, type: "纵向" },
        { code: "纵_QZZZ", fullName: "【182150*A6265121/002/090】2026全重自主课题-人工智能赋能工业控制程序形式化验证技术研究", freeze: 0, baseAvailable: 75000, type: "纵向" },
        { code: "纵_GZR", fullName: "【511200-523500125002】王竟亦控制科学与工程学院2025年预研基金(国家自然科学基金)", freeze: 0, baseAvailable: 1976.77, type: "纵向" }
    ];

    // 记账流水 (每个记录含 isSupplement 字段)
    let transactions = [];   

    function loadTransactions() {
        const stored = localStorage.getItem("jy_finance_supplement_v2");
        if(stored) {
            transactions = JSON.parse(stored);
        } else {
            transactions = [];   // 完全干净，无任何预设流水
        }
        updateProjectStats();
    }

    function saveTransactions() {
        localStorage.setItem("jy_finance_supplement_v2", JSON.stringify(transactions));
    }

    // 仅统计非补录的收支 (补录不计入项目统计)
    let projectIncomes = {}, projectExpenses = {};
    function updateProjectStats() {
        baseProjects.forEach(p => { projectIncomes[p.code] = 0; projectExpenses[p.code] = 0; });
        transactions.forEach(t => {
            // 核心判断: 只有非补录才影响实际财务总额
            if(t.isSupplement === "补录") return;
            if(t.income > 0) projectIncomes[t.projectCode] = (projectIncomes[t.projectCode] || 0) + t.income;
            if(t.expense > 0) projectExpenses[t.projectCode] = (projectExpenses[t.projectCode] || 0) + t.expense;
        });
    }

    // 动态余额 = 原始可用 + 非补录收入 - 非补录支出
    function getDynamicAvailable(proj) {
        let inc = projectIncomes[proj.code] || 0;
        let exp = projectExpenses[proj.code] || 0;
        let dynamic = proj.baseAvailable + inc - exp;
        return dynamic < 0 ? 0 : dynamic;
    }

    // 渲染 KPI: 仅统计非补录的收支
    function renderKPI() {
        const totalOriginal = baseProjects.reduce((s,p)=> s + p.baseAvailable,0);
        const totalFreeze = baseProjects.reduce((s,p)=> s + p.freeze,0);
        const totalInc = Object.values(projectIncomes).reduce((a,b)=>a+b,0);
        const totalExp = Object.values(projectExpenses).reduce((a,b)=>a+b,0);
        const dynamicTotal = baseProjects.reduce((s,p)=> s + getDynamicAvailable(p),0);
        document.getElementById("kpiArea").innerHTML = `
            <div class="kpi-card"><div class="kpi-label">动态总余额</div><div class="kpi-number">¥ ${dynamicTotal.toFixed(2)}</div><div class="kpi-sub">仅非补录影响</div></div>
            <div class="kpi-card"><div class="kpi-label">冻结总额</div><div class="kpi-number">¥ ${totalFreeze.toFixed(2)}</div><div class="kpi-sub"></div></div>
            <div class="kpi-card"><div class="kpi-label">非补录总收入</div><div class="kpi-number">¥ ${totalInc.toFixed(2)}</div><div class="kpi-sub">实时入账</div></div>
            <div class="kpi-card"><div class="kpi-label">非补录总支出</div><div class="kpi-number">¥ ${totalExp.toFixed(2)}</div><div class="kpi-sub">实时支出</div></div>
        `;
    }

    function renderProjectsTable() {
        const tbody = document.getElementById("projectsMasterBody");
        tbody.innerHTML = baseProjects.map(p => {
            const dynamicBal = getDynamicAvailable(p);
            const inc = projectIncomes[p.code] || 0;
            const exp = projectExpenses[p.code] || 0;
            return `<tr>
                <td style="font-weight:500;">${p.code}</td>
                <td style="font-size:0.75rem; max-width:380px;">${p.fullName}</td>
                <td class="money-neutral">${p.freeze.toFixed(2)}</td>
                <td>${p.baseAvailable.toFixed(2)}</td>
                <td class="money-positive">${inc.toFixed(2)}</td>
                <td class="money-neutral">${exp.toFixed(2)}</td>
                <td class="money-positive" style="font-weight:700;">${dynamicBal.toFixed(2)}</td>
            　　`;
        }).join('');
    }

    function renderRecentTransactions() {
        const tbody = document.getElementById("recentTxBody");
        if(transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">暂无记账流水，请添加上方记录</td></tr>';
            return;
        }
        const reversed = [...transactions].reverse();
        tbody.innerHTML = reversed.map(t => {
            const supplementClass = t.isSupplement === "补录" ? 'badge-supplement' : 'badge-normal';
            const supplementText = t.isSupplement === "补录" ? '补录(不影响总额)' : '非补录';
            return `
            <tr>
                <td>${t.date}</td>
                <td>${t.category}</td>
                <td>${t.description || '-'}</td>
                <td>${t.projectCode}</td>
                <td><span class="${supplementClass}">${supplementText}</span></td>
                <td>${t.reimburseNo ? t.reimburseNo : '-'}</td>
                <td>${t.invoiceLink ? `<a class="file-link" href="#" onclick="alert('凭证: ${t.invoiceLink}')">📎 查看</a>` : '-'}</td>
                <td class="money-positive">${t.income > 0 ? t.income.toFixed(2) : '-'}</td>
                <td class="money-neutral">${t.expense > 0 ? t.expense.toFixed(2) : '-'}</td>
                <td><button class="delete-btn" data-id="${t.id}">🗑️</button></td>
            </tr>`;
        }).join('');
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                transactions = transactions.filter(t => t.id !== id);
                saveTransactions();
                updateProjectStats();
                renderAll();
            });
        });
    }

    // 图表: 饼图仅统计非补录支出（因为补录不计入实际财务）
    let pieChart, horizontalChart, verticalChart, freezeChart;
    function updateCharts() {
        // 饼图: 按预算分类统计非补录支出
        const catMap = new Map();
        transactions.forEach(t => {
            if(t.expense > 0 && t.isSupplement !== "补录") {
                catMap.set(t.category, (catMap.get(t.category) || 0) + t.expense);
            }
        });
        const pieLabels = catMap.size ? Array.from(catMap.keys()) : ['暂无支出数据'];
        const pieData = catMap.size ? Array.from(catMap.values()) : [1];
        if(pieChart) pieChart.destroy();
        const ctxPie = document.getElementById('expensePieChart').getContext('2d');
        pieChart = new Chart(ctxPie, { type: 'pie', data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: ['#2C7DA0','#A9D6E5','#61A5C2','#F4A261','#E9C46A','#E76F51','#8ECAE6'] }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } } });
        
        // 横向项目可用余额 (基于动态余额，已经排除补录)
        const horizontalProjects = baseProjects.filter(p => p.type === "横向").map(p => ({ code: p.code, bal: getDynamicAvailable(p) })).sort((a,b)=>b.bal - a.bal);
        if(horizontalChart) horizontalChart.destroy();
        const ctxHor = document.getElementById('horizontalBarChart').getContext('2d');
        horizontalChart = new Chart(ctxHor, { type: 'bar', data: { labels: horizontalProjects.map(p=>p.code), datasets: [{ label: '动态可用余额 (¥)', data: horizontalProjects.map(p=>p.bal), backgroundColor: '#3a86ff', borderRadius: 8 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `¥ ${ctx.raw.toFixed(2)}` } } } } });
        
        // 纵向项目
        const verticalProjects = baseProjects.filter(p => p.type === "纵向").map(p => ({ code: p.code, bal: getDynamicAvailable(p) })).sort((a,b)=>b.bal - a.bal);
        if(verticalChart) verticalChart.destroy();
        const ctxVert = document.getElementById('verticalBarChart').getContext('2d');
        verticalChart = new Chart(ctxVert, { type: 'bar', data: { labels: verticalProjects.map(p=>p.code), datasets: [{ label: '动态可用余额 (纵向项目)', data: verticalProjects.map(p=>p.bal), backgroundColor: '#2a9d8f', borderRadius: 8 }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `¥ ${ctx.raw.toFixed(2)}` } } } } });
        
        // 冻结vs原始可用 (展示前12项目)
        const sample = baseProjects.slice(0,12);
        if(freezeChart) freezeChart.destroy();
        const ctxFreeze = document.getElementById('freezeAvailableChart').getContext('2d');
        freezeChart = new Chart(ctxFreeze, { type: 'bar', data: { labels: sample.map(p=>p.code), datasets: [{ label: '冻结金额', data: sample.map(p=>p.freeze), backgroundColor: '#b5838d' }, { label: '原始可用余额', data: sample.map(p=>p.baseAvailable), backgroundColor: '#6d6875' }] }, options: { responsive: true, maintainAspectRatio: true } });
    }

    function renderAll() {
        renderKPI();
        renderProjectsTable();
        renderRecentTransactions();
        updateCharts();
    }

    // 新增记账: 支持补录/非补录标记
    function addTransaction() {
        const date = document.getElementById('txnDate').value;
        const category = document.getElementById('txnCategory').value;
        const desc = document.getElementById('txnDesc').value.trim() || "记账";
        const projectCode = document.getElementById('txnProject').value;
        const reimburseNo = document.getElementById('txnReimburseNo').value.trim() || "";
        const invoiceLink = document.getElementById('txnInvoiceLink').value.trim() || "";
        const isSupplement = document.getElementById('txnIsSupplement').value;  // "补录" 或 "非补录"
        let income = parseFloat(document.getElementById('txnIncome').value) || 0;
        let expense = parseFloat(document.getElementById('txnExpense').value) || 0;
        if(income < 0) income = 0;
        if(expense < 0) expense = 0;
        if(income === 0 && expense === 0) { alert("请填写收入或支出金额"); return; }
        const newId = Date.now();
        const newTxn = { 
            id: newId, 
            date, 
            category, 
            description: desc, 
            projectCode, 
            income, 
            expense, 
            reimburseNo, 
            invoiceLink,
            isSupplement: isSupplement
        };
        transactions.push(newTxn);
        saveTransactions();
        updateProjectStats();   // 重新统计非补录数据
        renderAll();
        // 清空部分输入
        document.getElementById('txnIncome').value = '0';
        document.getElementById('txnExpense').value = '0';
        document.getElementById('txnDesc').value = '';
        document.getElementById('txnReimburseNo').value = '';
        document.getElementById('txnInvoiceLink').value = '';
    }

    function initProjectSelect() {
        const select = document.getElementById('txnProject');
        select.innerHTML = baseProjects.map(p => `<option value="${p.code}">${p.code} - ${p.fullName.substring(0, 70)}${p.fullName.length > 70 ? '…' : ''}</option>`).join('');
    }

    loadTransactions();
    initProjectSelect();
    document.getElementById('addTransactionBtn').addEventListener('click', addTransaction);
    renderAll();
</script>
</body>
</html>
